[package]
name = "chickie-api"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.102"
async-trait = "0.1.89"
axum = { version = "0.8.8", features = ["multipart"] }
aws-config = "=1.0.1"
aws-sdk-s3 = "=1.5.0"
bcrypt = "0.18.0"
bytes = "1.10"
chrono = { version = "0.4.43", features = ["serde"] }
rust_decimal = { version = "1.38", features = ["serde"] }
rust_decimal_macros = "1.38"
sea-orm = { version = "1.1", features = ["sqlx-postgres", "runtime-tokio-rustls", "uuid", "chrono", "rust_decimal", "macros", "with-uuid", "with-chrono", "with-rust_decimal"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
tokio = { version = "1.49.0", features = ["macros", "rt-multi-thread"] }
tower-http = { version = "0.6.8", features = ["cors"] }
uuid = { version = "1.20.0", features = ["serde", "v4"] }
jsonwebtoken = { version = "10.3", features = ["rust_crypto"] }
dotenvy = "0.15.7"
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }
utoipa = { version = "5", features = ["axum_extras", "chrono", "uuid", "decimal"] }
utoipa-swagger-ui = { version = "9", features = ["axum"] }
