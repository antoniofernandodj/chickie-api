services:
  smtp-server:
    build: .
    container_name: smtp-server
    restart: unless-stopped
    ports:
      - "2525:2525"   # SMTP padrão
      - "2587:2587"   # Submission
      - "4465:4465"   # SMTPS (TLS implícito)
    environment:
      - RUST_LOG=smtp_server=info,info
      - SMTP_HOSTNAME=smtp.seudominio.com
      - SMTP_PORT=2525
      - SMTPS_PORT=4465
      - SMTP_SUBMISSION_PORT=2587
      - REQUIRE_AUTH=true
      - SMTP_USERNAME=admin@seudominio.com
      - SMTP_PASSWORD=senha-segura-aqui
      - TLS_CERT_PATH=/app/certs/cert.pem
      - TLS_KEY_PATH=/app/certs/key.pem
      # Relay opcional — descomente para enviar e-mails de verdade:
      # - RELAY_HOST=smtp.mailersend.net
      # - RELAY_PORT=587
      # - RELAY_USERNAME=seu-usuario
      # - RELAY_PASSWORD=sua-senha
    volumes:
      # Monte seus certificados reais aqui em produção:
      # - ./certs:/app/certs:ro
      - smtp_logs:/app/logs
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2525"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  smtp_logs:
