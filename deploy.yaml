define:
  api_version: "dev"
  mysql_version: "8.0.43"
  redis_version: "7.0.11"
  loki_version: "3.4.2"
  grafana_version: "11.5.2"
  postgres_version: "15.2"

services:
  api_dev:
    image: "chiquitos/api:${api_version}"
    build:
      context: .
      dockerfile: Dockerfile
      tags:
        - "chiquitos/api:${api_version}"
    network_mode: host
    restart: "on-failure"
    remotecheck:
      endpoint: /ok
    instances:
      api1:
        environment:
          - APP_PORT=3001
        command: bash -c "/app/chickie"
        remotecheck:
          port: 3001

      api2:
        environment:
          - APP_PORT=3002
        command: bash -c "/app/chickie"
        remotecheck:
          port: 3002

      api3:
        environment:
          - APP_PORT=3003
        command: bash -c "/app/chickie"
        remotecheck:
          port: 3003

      api4:
        environment:
          - APP_PORT=3004
        command: bash -c "/app/chickie"
        remotecheck:
          port: 3004

  mysql:
    image: "mysql:${mysql_version}"
    instances:
      mysql:
        restart: unless-stopped
        env_file:
          - ./database.secrets.env
        network_mode: host
        volumes:
          - ./sqls/mysql-init:/docker-entrypoint-initdb.d
          - mysql_data:/var/lib/mysql
          - ./backup.prod.sql:/backup.prod.sql
        healthcheck:
          test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
          interval: 10s
          timeout: 5s
          retries: 5

  postgres:
    image: "postgres:${postgres_version}"
    instances:
      postgres:
        restart: unless-stopped
        env_file:
          - ./database.secrets.env
        network_mode: host
        volumes:
          - ./sqls/postgres-init:/docker-entrypoint-initdb.d
          - postgres_data:/var/lib/postgresql/data
          - ./backup.prod.sql:/backup.prod.sql
        healthcheck:
          test: ["CMD", "pg_isready", "-U", "postgres"]
          interval: 10s
          timeout: 5s
          retries: 5
        environment:
          - POSTGRES_USER=myuser
          - POSTGRES_PASSWORD=mypassword
          - POSTGRES_DB=mydatabase

  redis:
    image: "redis:${redis_version}"
    instances:
      cache:
        network_mode: host
        restart: always
        mem_limit: 256m
        volumes:
          - cache:/data
        environment:
          - REDIS_MAXMEMORY=256m

  loki:
    image: "grafana/loki:${loki_version}"
    instances:
      loki:
        restart: unless-stopped
        ports:
          - "3111:3111"
        volumes:
          - ./conf/loki.yaml:/etc/loki/loki.yaml
          - loki-data:/var/loki
        environment:
          - LOKI_CONFIG_FILE=/etc/loki/loki.yaml
        command: -config.file=/etc/loki/loki.yaml

  grafana:
    image: "grafana/grafana:${grafana_version}"
    instances:
      ports:
        - "3000:3000"
      environment:
        - GF_SECURITY_ADMIN_PASSWORD=admin
      depends_on:
        - loki
      restart: unless-stopped
      volumes:
        - grafana-data:/var/lib/grafana

volumes:
  mysql_data:
  cache:
  loki-data:
  grafana-data:

networks:
  default:
    name: flow_network
    driver: bridge
