version: '3.8'

services:
  postgres:
    image: postgres:15.2
    container_name: postgres
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydatabase
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mynetwork

  api:
    build:
      context: .
      dockerfile: dockerfiles/api.dockerfile
    container_name: chickie-api
    environment:
      DATABASE_URL: postgres://myuser:mypassword@postgres:5432/mydatabase
      APP_PORT: "3000"
      RUST_LOG: info
      JWT_SECRET: secret
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    networks:
      - mynetwork

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: chickie-worker
    environment:
      DATABASE_URL: postgres://myuser:mypassword@postgres:5432/mydatabase
      RUST_LOG: info
    depends_on:
      - postgres
    networks:
      - mynetwork

  scheduler:
    build:
      context: .
      dockerfile: dockerfiles/scheduler.dockerfile
    container_name: chickie-scheduler
    environment:
      DATABASE_URL: postgres://myuser:mypassword@postgres:5432/mydatabase
      RUST_LOG: info
      SCHEDULER_PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - mynetwork
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:

networks:
  mynetwork:
    driver: bridge
